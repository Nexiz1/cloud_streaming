<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading - CLOUDPLAY</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .loading-container {
      background: var(--panel-bg);
      padding: 40px;
      border-radius: 12px;
      border: 1px solid #333;
      text-align: center;
      width: 80%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    h1 {
      color: var(--accent-color);
      margin-top: 0;
      letter-spacing: 2px;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #333;
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .status-text {
      font-size: 1.1rem;
      margin-bottom: 10px;
      color: #eee;
    }

    .status-detail {
      font-size: 0.9rem;
      color: var(--text-muted);
      height: 40px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <h1>CLOUDPLAY</h1>
    <div class="spinner"></div>
    <div class="status-text" id="statusText">Initializing Setup...</div>
    <div class="status-detail" id="statusDetail">Connecting to WSL...</div>
  </div>

  <script>
    // Receive messages from main process via IPC
    if (window.electronAPI) {
      window.electronAPI.onSetupProgress((event, message) => {
        document.getElementById('statusText').innerText = message.status || document.getElementById('statusText').innerText;
        document.getElementById('statusDetail').innerText = message.detail || '';
        
        if (message.status && message.status.includes('ERROR')) {
          document.getElementById('statusText').style.color = '#ff4d4f';
          document.querySelector('.spinner').style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
